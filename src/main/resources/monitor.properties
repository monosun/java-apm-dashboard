# ============================================================
# Java Performance Monitor — 설정 파일
# ============================================================
#
# [적용 우선순위] (높을수록 우선)
#   1. 시스템 속성  : -Dserver.http.port=8888
#   2. 외부 파일    : JAR와 같은 디렉터리의 monitor.properties
#   3. 이 파일(기본): JAR 내 클래스패스 기본값
#
# [원격 JVM 연결] 대상 JVM 시작 시 아래 옵션을 추가하세요:
#   -Dcom.sun.management.jmxremote
#   -Dcom.sun.management.jmxremote.port=9999
#   -Dcom.sun.management.jmxremote.authenticate=false
#   -Dcom.sun.management.jmxremote.ssl=false
# ============================================================

# ── HTTP 서버 ─────────────────────────────────────────────────
# 메트릭 HTTP 서버 포트 (대시보드: http://host:{port}/dashboard)
server.http.port=9090

# JVM 스냅샷 콘솔 출력 주기 (초, 0 = 비활성)
server.print.interval.sec=15

# 스팬 링 버퍼 크기 (최근 N개 스팬 보관)
server.span.buffer.size=1000

# ── 원격 JVM 모니터링 (JMX) ───────────────────────────────────
# true 로 변경하면 원격 JVM 메트릭을 수집합니다
remote.jmx.enabled=false

# 대상 JVM의 호스트
remote.jmx.host=localhost

# 대상 JVM의 JMX 포트 (jmxremote.port 와 동일하게 설정)
remote.jmx.port=9999

# JMX 인증 사용자 / 비밀번호 (인증 미사용 시 비워두세요)
remote.jmx.user=
remote.jmx.password=

# 수집 주기 (초)
remote.jmx.poll.interval.sec=5

# 연결 끊김 시 재연결 시도 주기 (초)
remote.jmx.reconnect.interval.sec=30

# ── 경고 임계치 (콘솔 WARN 로그 출력) ────────────────────────
# Heap 사용률(%) 임계치
alert.heap.percent=85

# 프로세스 CPU 사용률(%) 임계치
alert.cpu.percent=80

# 스팬 오류율(%) 임계치
alert.error.rate.percent=10
