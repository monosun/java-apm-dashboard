# ============================================================
# Java APM Dashboard — 설정 파일
# ============================================================
#
# [적용 우선순위] (높을수록 우선)
#   1. 시스템 속성  : -Dserver.http.port=8888
#   2. 외부 파일    : JAR와 같은 디렉터리의 monitor.properties
#   3. 이 파일(기본): JAR 내 클래스패스 기본값
# ============================================================

# ── HTTP 서버 ────────────���───────────────────────────���────────
# 메트릭 HTTP 서버 포트 (대시보드: http://host:{port}/dashboard)
server.http.port=9090

# JVM 스냅샷 콘솔 출력 주기 (초, 0 = 비활성)
server.print.interval.sec=15

# 스팬 링 버퍼 크기 (최근 N개 스팬 보관)
server.span.buffer.size=1000

# ── 대시보드 표시 설정 ─────────────────────────────��───────────
# 최근 트레이스(스팬) 섹션 표시 여부 (false 시 대시보드에서 숨김)
server.traces.enabled=true

# ── Agent HTTP 모니터링 ─────────────────────────���─────────────
# HTTP 방식으로 대상 JVM 스레드를 모니터링합니다.
# 대상 JVM 시작 시 아��� 옵션을 추가하세요:
#   java -javaagent:java-monitor-agent.jar=port=7979 -jar your-app.jar
# 또는 동적 부착 (Attach API):
#   VirtualMachine.attach(PID).loadAgent("java-monitor-agent.jar", "port=7979");

# true 로 변경하면 Agent HTTP 방식으로 원격 스레드를 수집합니다
agent.enabled=false

# 대상 JVM 호스트 (ThreadMonitorAgent 실행 호스트)
agent.host=localhost

# 대상 JVM Agent 포트 (-javaagent 인수로 지정한 port)
agent.port=7979

# 수집 주기 (초)
agent.poll.interval.sec=5

# ── 경고 임계치 (콘솔 WARN 로그 출력) ────────��───────────────
# Heap 사용률(%) 임계치
alert.heap.percent=85

# 프로세스 CPU 사용률(%) 임계치
alert.cpu.percent=80

# 스팬 오류율(%) 임계치
alert.error.rate.percent=10
